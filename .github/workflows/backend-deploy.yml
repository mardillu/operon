name: Deploy to Google Cloud Run

on:
  push:
    branches:
      - main
    paths:
      - 'Operon-Backend/**'
      - '.github/workflows/backend-deploy.yml'

env:
  PROJECT_ID: gemini-live-agent-challenge-1
  REGION: us-central1
  SERVICE_NAME: autopilot-agent
  APP_ENV: DEV

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Google Auth
        id: auth
        uses: 'google-github-actions/auth@v2'
        with:
          # Prefer Workload Identity Federation:
          # workload_identity_provider: 'projects/123456789/locations/global/workloadIdentityPools/my-pool/providers/my-provider'
          # service_account: 'my-service-account@my-project.iam.gserviceaccount.com'
          
          # OR use standard service account JSON key (less secure but easier to setup):
          credentials_json: '${{ secrets.GCP_CREDENTIALS }}'

      - name: Set up Cloud SDK
        uses: 'google-github-actions/setup-gcloud@v2'
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Deploy to Cloud Run
        id: deploy
        uses: 'google-github-actions/deploy-cloudrun@v2'
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          source: ./Operon-Backend # Automatically builds the backend folder
          flags: '--allow-unauthenticated'
          env_vars: |
            GOOGLE_CLOUD_PROJECT=${{ env.PROJECT_ID }}
            GOOGLE_CLOUD_LOCATION=${{ env.REGION }}
            FIRESTORE_ENABLED=true
            APP_ENV=${{ env.APP_ENV }}
            # GEMINI_API_KEY or configure Vertex credentials properly
          
      - name: Show Output
        run: echo "Deployed to ${{ steps.deploy.outputs.url }}"
